[build]
  publish = "dist"
  command = "npm run build"
  environment = { NODE_VERSION = "18" }

# Redirecciones para páginas HTML (sin .html en la URL)
[[redirects]]
  from = "/projects/residential"
  to = "/projects/residential.html"
  status = 200

[[redirects]]
  from = "/projects/commercial"
  to = "/projects/commercial.html"
  status = 200

[[redirects]]
  from = "/projects/tourism"
  to = "/projects/tourism.html"
  status = 200

[[redirects]]
  from = "/projects/urban"
  to = "/projects/urban.html"
  status = 200

[[redirects]]
  from = "/projects/vivienda"
  to = "/projects/vivienda.html"
  status = 200

[[redirects]]
  from = "/projects/hospitalario"
  to = "/projects/hospitalario.html"
  status = 200

[[redirects]]
  from = "/projects/maharishi-vastu"
  to = "/projects/maharishi-vastu.html"
  status = 200

[[redirects]]
  from = "/brand/importadora"
  to = "/brand/importadora.html"
  status = 200

[[redirects]]
  from = "/brand/square"
  to = "/brand/square.html"
  status = 200

[[redirects]]
  from = "/brand/capital"
  to = "/brand/capital.html"
  status = 200

[[redirects]]
  from = "/brand/foundation"
  to = "/brand/foundation.html"
  status = 200

[[redirects]]
  from = "/brand/novaterra"
  to = "/brand/novaterra.html"
  status = 200

# Fallback para SPA (debe ser el último redirect)
# Solo redirige si el archivo no existe
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for performance optimization
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/webp"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/avif"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "font/woff2"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# Compression is handled automatically by Netlify
# Do not set Content-Encoding header manually

